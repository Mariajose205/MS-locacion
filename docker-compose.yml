version: '3.8'

services:
  mysql-locations:
    image: mysql:8.0
    container_name: mysql-locations
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fitlife_locations_db
    ports:
      - "3310:3306"
    networks:
      - fitlife-network
    volumes:
      - mysql-locations-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms-location:
    build: .
    container_name: ms-location
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-locations:3306/fitlife_locations_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - fitlife-network
    depends_on:
      mysql-locations:
        condition: service_healthy
    restart: always

networks:
  fitlife-network:
    driver: bridge

volumes:
  mysql-locations-data:
