# Server Configuration
server.port=8082
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fitlife_locations_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.fitlife.location=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application Info
spring.application.name=MS-Location
management.endpoints.web.exposure.include=health,info,circuitbreakers

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.locationsCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.locationsCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.locationsCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.locationsCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.locationsCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.locationsCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.locationsCB.slowCallRateThreshold=100
resilience4j.circuitbreaker.instances.locationsCB.slowCallDurationThreshold=2s

# Resilience4j Retry Configuration
resilience4j.retry.instances.locationsRetry.maxAttempts=3
resilience4j.retry.instances.locationsRetry.waitDuration=1s
resilience4j.retry.instances.locationsRetry.retryExceptions=java.io.IOException,java.util.concurrent.TimeoutException
